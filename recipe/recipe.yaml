# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

context:
  version: "0.11.0"
  build_number: 0
  torch_proc_type: ${{ "cuda" ~ cuda_compiler_version | version_to_buildstring if cuda_compiler_version != "None" else "cpu" }}
  # ensure arm_variant_type gets detected as a used variable
  touch_arm_variant_type: ${{ arm_variant_type | default("None") }}

recipe:
  name: torchcodec-split
  version: ${{ version }}

source:
  - url: https://github.com/meta-pytorch/torchcodec/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 86d2b65634a31fc64caf0c6492c392e16296aae2e9f41c2d4be33bf267c088d4
    patches:
      - fix_third_party_interface_library_loading.patch
      - if: win
        then:
          - use_correct_python_on_windows.patch

build:
  number: ${{ build_number }}
  skip:
    # PyTorch does not support cuda 11
    - cuda_compiler_version == "11.8"
  string: ${{ torch_proc_type }}_py${{ python | version_to_buildstring }}_h${{ hash }}_${{ build_number }}

outputs:
  - package:
      name: torchcodec
    build:
      script:
        file: build
    requirements:
      build:
        - if: build_platform != target_platform
          then:
            - python
            - cross-python_${{ target_platform }}
            - pytorch
            - if: cuda_compiler_version != "None"
              then:
                - cuda-driver-dev
                - cuda-cudart-dev
                - cuda-nvrtc-dev
                - cuda-nvtx-dev
                - cuda-nvml-dev
                - cuda-profiler-api
                - libcublas-dev
                - libcufft-dev
                - libcurand-dev
                - libcusolver-dev
                - libcusparse-dev
        - ${{ compiler('cxx') }}
        - ${{ compiler('c') }}
        - ${{ stdlib("c") }}
        - if: cuda_compiler_version != "None"
          then:
            - ${{ compiler('cuda') }}
        - if: cuda_compiler_version != "None" and linux and aarch64
          then:
            - arm-variant * ${{ arm_variant_type | default("None") }}
        - cmake
        - pkgconf
        - ninja

      host:
        - python
        - pip
        - setuptools
        - ffmpeg
        # During the build, we link against the lgpl version of ffmpeg, to avoid license violation (and so we pass
        # I_CONFIRM_THIS_IS_NOT_A_LICENSE_VIOLATION to the wheel build to confirm that we want indeed to link to conda-forge's
        # ffmpeg. At runtime the user can install either lgpl or gpl ffmpeg as preferred
        - ffmpeg * [build=lgpl_*]
        - libtorch
        - pytorch
        # We temporary relatex the pytorch dependency on to be compatible with torchvision,
        # see https://github.com/conda-forge/torchcodec-feedstock/pull/69#issuecomment-4751807811
        - if: cuda_compiler_version == "12.9" and win
          then:
            - libtorch * [build=cuda12*]
            - pytorch * [build=cuda12*]
          else:
            - libtorch * [build=${{ torch_proc_type }}*]
            - pytorch * [build=${{ torch_proc_type }}*]
        - pybind11
        - if: cuda_compiler_version != "None"
          then:
            # These are dev packages (headers etc.) for transitive dependencies of libtorch
            - cuda-version ==${{ cuda_compiler_version }}
            - if: linux
              then:
                - cuda-driver-dev
                - nccl
            - cuda-cudart-dev
            - cuda-nvrtc-dev
            - cuda-nvtx-dev
            - cuda-nvml-dev
            - cuda-profiler-api
            - libcublas-dev
            - libcufft-dev
            - libcurand-dev
            - libcusolver-dev
            - libcusparse-dev
            - libmagma-devel
            - nvtx-c
            # These are actual torchcodec deps
            - libnpp-dev
      run:
        - python
        # We temporary relatex the pytorch dependency on to be compatible with torchvision,
        # see https://github.com/conda-forge/torchcodec-feedstock/pull/69#issuecomment-4751807811
        - if: cuda_compiler_version == "12.9" and win
          then:
            - pytorch * [build=cuda12*]
          else:
            - pytorch * [build=${{ torch_proc_type }}*]

    tests:
      - python:
          imports:
            - torchcodec
          pip_check: true

  - package:
      name: torchcodec-tests
    build:
      # On Windows we run a script to transform the symlinked test files in
      # actual copied files, as symlinks are not well supported on Windows
      script:
        - if: unix
          then:
            - python $RECIPE_DIR/remove_symlinks_from_test_on_windows.py
        - if: win
          then:
            - python %RECIPE_DIR%\\remove_symlinks_from_test_on_windows.py
    requirements:
      build:
        # To run the remove_symlinks_from_test_on_windows.py script
        - python
      run:
        - ${{ pin_subpackage('torchcodec', exact=True) }}
    tests:
      - files:
          source:
            - test/
        requirements:
          run:
            - pytest
            - numpy
            - pillow
            - torchvision
            # Required by third-party-interface tests
            - cmake
            - pkg-config
            - ${{ compiler('cxx') }}
            - ${{ compiler('c') }}
            - make
            - if: cuda_compiler_version != "None"
              then:
                - ${{ compiler('cuda') }}
                - cuda-version ==${{ cuda_compiler_version }}
                - cuda-nvrtc-dev
                - libcublas-dev
        script:
          interpreter: python
          content:
            - import subprocess
            - import sys
            - tests_to_skip = []
            - test_paths = ["test"]
            - pytest_extra_args = []
            - if: build_platform != target_platform
              then:
                # Cross-compiled test runs are often executed in emulation in CI, so run a reduced smoke suite.
                - |
                  test_paths = [
                      "test/test_version.py",
                      "test/test_frame_dataclasses.py",
                      "test/test_metadata.py",
                      "test/test_decoders.py",
                  ]
                  pytest_extra_args += ["--durations=50"]
            - if: target_platform == "osx-64"
              then:
                # osx-64 (macOS on Intel) is not explicitly supported by torchcodec, see
                # https://github.com/conda-forge/torchcodec-feedstock/pull/11
                # and https://github.com/conda-forge/torchcodec-feedstock/pull/38#issuecomment-3456998748
                # As long as the vast majority of tests pass, skip the few tests that do not pass.
                - |
                  test_paths = ["test"]
                  pytest_extra_args = []
                  tests_to_skip += [
                      "test/test_encoders.py",
                      "test/test_ops.py::TestVideoEncoderOps::test_against_to_file",
                      "test/test_ops.py::TestVideoEncoderOps::test_video_encoder_round_trip",
                      "test/test_ops.py::TestVideoDecoderOps::test_throws_exception_at_eof[cpu]",
                      "test/test_ops.py::TestVideoDecoderOps::test_throws_exception_if_seek_too_far[cpu]",
                      "test/test_ops.py::TestAudioDecoderOps::test_next[asset0]",
                      "test/test_ops.py::TestAudioDecoderOps::test_next[asset1]",
                      "test/test_transform_ops.py::TestPublicVideoDecoderTransformOps",
                  ]
            - if: osx
              then:
                # test_third_party_interface is not supported upstream on macOS.
                - tests_to_skip += ["test/third-party-interface/test_third_party_interface.py"]
            - if: win
              then:
                # test_third_party_interface is not supported upstream on Windows.
                - |
                  tests_to_skip += [
                      "test/third-party-interface/test_third_party_interface.py",
                      "test/test_encoders.py::TestAudioEncoder::test_against_cli",
                      "test/test_encoders.py::TestVideoEncoder::test_video_encoder_against_ffmpeg_cli",
                  ]
            - |
              pytest_args = ["pytest", "-v"] + pytest_extra_args
              for test in tests_to_skip:
                  pytest_args.extend(["--deselect", test])
              pytest_args.extend(test_paths)

              print(f"running with args: {pytest_args}")
              sys.exit(subprocess.call(pytest_args))

about:
  homepage: https://github.com/meta-pytorch/torchcodec
  license: BSD-3-Clause
  license_file:
    - LICENSE
  summary: TorchCodec is a Python library for decoding videos into PyTorch tensors, on CPU and CUDA GPU.

extra:
  recipe-maintainers:
    - traversaro
    - Dan-Flores
  feedstock-name: torchcodec
